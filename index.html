<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>網頁版暗棋 (Dark Chess)</title>
    <style>
        :root {
            --board-bg: #eecfa1;
            --border-color: #5c4033;
            --piece-size: 60px;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        h1 { margin-bottom: 10px; }

        #game-info {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        #status { font-size: 1.2em; font-weight: bold; color: #f1c40f; }
        #player-color { margin-top: 5px; font-size: 0.9em; }

        /* 棋盤 Grid */
        #board {
            display: grid;
            grid-template-columns: repeat(8, 1fr); /* 8列 */
            grid-template-rows: repeat(4, 1fr);    /* 4行 */
            gap: 2px;
            background-color: var(--border-color);
            border: 5px solid var(--border-color);
            padding: 5px;
            border-radius: 4px;
        }

        .cell {
            width: var(--piece-size);
            height: var(--piece-size);
            background-color: var(--board-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
        }

        /* 棋子樣式 */
        .piece {
            width: 85%;
            height: 85%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.4);
            user-select: none;
            border: 2px solid #8b4513;
        }

        /* 蓋牌狀態 */
        .piece.hidden {
            background: linear-gradient(135deg, #8b4513 0%, #a0522d 100%);
            color: transparent;
            border: 2px solid #5c4033;
        }
        .piece.hidden::after {
            content: "☁"; /* 蓋牌圖示 */
            color: rgba(255,255,255,0.3);
            font-size: 1.2rem;
        }

        /* 紅方 */
        .piece.red {
            background-color: #fce4d6;
            color: #d00000;
            border-color: #d00000;
        }

        /* 黑方 */
        .piece.black {
            background-color: #fce4d6;
            color: #000000;
            border-color: #000000;
        }

        /* 選中狀態 */
        .piece.selected {
            box-shadow: 0 0 10px 4px yellow;
            transform: scale(1.1);
            z-index: 10;
        }

        /* 被吃掉的動畫 */
        .captured {
            opacity: 0;
            transform: scale(0);
            transition: all 0.3s ease;
        }

        /* 提示最後一步 */
        .last-move {
            background-color: rgba(255, 255, 0, 0.3);
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover { background: #2ecc71; }

    </style>
</head>
<body>

    <h1>象棋暗棋 (Dark Chess)</h1>
    
    <div id="game-info">
        <div id="status">當前回合：玩家 1</div>
        <div id="player-color">顏色未定</div>
    </div>

    <div id="board"></div>

    <button onclick="initGame()">重新開始</button>

    <script>
        // --- 遊戲常數與設定 ---
        const ROWS = 4;
        const COLS = 8;
        
        // 定義階級 (數字越大階級越高，除了特殊的帥/將 vs 兵/卒)
        // 7:將/帥, 6:士/仕, 5:象/相, 4:車/俥, 3:馬/傌, 2:包/砲, 1:卒/兵
        const PIECE_TYPES = {
            red: [
                { name: '帥', rank: 7, count: 1 }, // 修正：標準盤面只能放1個帥
                { name: '仕', rank: 6, count: 2 },
                { name: '相', rank: 5, count: 2 },
                { name: '俥', rank: 4, count: 2 },
                { name: '傌', rank: 3, count: 2 },
                { name: '砲', rank: 2, count: 2 },
                { name: '兵', rank: 1, count: 5 }
            ],
            black: [
                { name: '將', rank: 7, count: 1 }, // 修正：標準盤面只能放1個將
                { name: '士', rank: 6, count: 2 },
                { name: '象', rank: 5, count: 2 },
                { name: '車', rank: 4, count: 2 },
                { name: '馬', rank: 3, count: 2 },
                { name: '包', rank: 2, count: 2 },
                { name: '卒', rank: 1, count: 5 }
            ]
        };

        let boardState = []; // 儲存盤面資訊
        let selectedIndex = -1; // 當前選中的格子索引
        let currentPlayer = 1; // 1 或 2
        let playerColors = { 1: null, 2: null }; // 玩家代表的顏色 ('red' 或 'black')
        let isGameOver = false;

        const boardEl = document.getElementById('board');
        const statusEl = document.getElementById('status');
        const colorEl = document.getElementById('player-color');

        // --- 初始化遊戲 ---
        function initGame() {
            // 1. 產生所有棋子
            let pieces = [];
            ['red', 'black'].forEach(color => {
                PIECE_TYPES[color].forEach(type => {
                    for(let i=0; i<type.count; i++) {
                        pieces.push({
                            color: color,
                            name: type.name,
                            rank: type.rank,
                            revealed: false // 預設蓋牌
                        });
                    }
                });
            });

            // 2. 洗牌 (Fisher-Yates Shuffle)
            for (let i = pieces.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pieces[i], pieces[j]] = [pieces[j], pieces[i]];
            }

            // 3. 填入盤面
            boardState = pieces;
            selectedIndex = -1;
            currentPlayer = 1;
            playerColors = { 1: null, 2: null };
            isGameOver = false;

            renderBoard();
            updateStatus();
        }

        // --- 渲染畫面 ---
        function renderBoard() {
            boardEl.innerHTML = '';
            boardState.forEach((piece, index) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = index;
                cell.onclick = () => handleCellClick(index);

                if (piece) {
                    const pieceEl = document.createElement('div');
                    pieceEl.className = `piece ${piece.revealed ? piece.color : 'hidden'}`;
                    if (index === selectedIndex) pieceEl.classList.add('selected');
                    pieceEl.innerText = piece.name;
                    cell.appendChild(pieceEl);
                }
                boardEl.appendChild(cell);
            });
        }

        // --- 點擊處理核心邏輯 ---
        function handleCellClick(index) {
            if (isGameOver) return;

            const targetPiece = boardState[index];
            
            // 情況 A: 翻牌 (點擊暗棋)
            if (targetPiece && !targetPiece.revealed) {
                // 如果已經選中某顆棋子，不能去翻牌，必須先取消選取 (或是依規則，這算非法移動)
                // 這裡簡化：如果選中了棋子，點擊暗棋視為「取消選取並嘗試翻牌」(但通常翻牌需耗回合)
                // 為了嚴謹，若已選中棋子，點其他暗棋應視為無效或取消，這裡我們做成取消選取。
                if (selectedIndex !== -1) {
                    selectedIndex = -1;
                    renderBoard();
                    return;
                }
                flipPiece(index);
                return;
            }

            // 情況 B: 選取自己的棋子 (準備移動)
            if (targetPiece && targetPiece.revealed) {
                // 檢查是否是自己的顏色
                if (playerColors[currentPlayer] && targetPiece.color !== playerColors[currentPlayer]) {
                    // 點到對手的棋子 -> 視為攻擊目標 (如果有選中自己的棋子)
                    if (selectedIndex !== -1) {
                        attemptMove(selectedIndex, index);
                    }
                    return;
                }

                // 點到自己的棋子 -> 選取 / 切換選取
                selectedIndex = index;
                renderBoard();
                return;
            }

            // 情況 C: 移動到空格
            if (!targetPiece && selectedIndex !== -1) {
                attemptMove(selectedIndex, index);
            }
        }

        // --- 翻牌邏輯 ---
        function flipPiece(index) {
            const piece = boardState[index];
            piece.revealed = true;

            // 決定顏色 (如果是全場第一顆翻開的)
            if (playerColors[1] === null) {
                playerColors[currentPlayer] = piece.color;
                playerColors[currentPlayer === 1 ? 2 : 1] = (piece.color === 'red' ? 'black' : 'red');
            }

            endTurn();
        }

        // --- 移動與攻擊判定 ---
        function attemptMove(fromIndex, toIndex) {
            const fromPiece = boardState[fromIndex];
            const toPiece = boardState[toIndex]; // 可能為 null (空格) 或 對手棋子

            // 基本驗證：是否相鄰 (上下左右)
            if (!isAdjacent(fromIndex, toIndex)) {
                // 特殊例外：如果是砲，且是為了吃子，可以不相鄰
                if (!(fromPiece.rank === 2 && toPiece !== null)) {
                    // 如果不是砲吃子，且不相鄰 -> 無效
                    selectedIndex = -1;
                    renderBoard();
                    return;
                }
            }

            // 攻擊判定
            if (toPiece) {
                if (!canCapture(fromPiece, toPiece, fromIndex, toIndex)) {
                    alert("無法吃子：違反規則！");
                    selectedIndex = -1;
                    renderBoard();
                    return;
                }
            } else {
                // 移動到空格：砲只能走一格
                if (fromPiece.rank === 2 && !isAdjacent(fromIndex, toIndex)) {
                     selectedIndex = -1;
                     renderBoard();
                     return;
                }
            }

            // 執行移動
            boardState[toIndex] = fromPiece;
            boardState[fromIndex] = null;
            
            // 檢查勝利條件 (簡單版：如果對手沒棋子了)
            checkWin();

            endTurn();
        }

        // --- 規則判定函數 ---

        // 判斷相鄰
        function isAdjacent(i1, i2) {
            const r1 = Math.floor(i1 / COLS), c1 = i1 % COLS;
            const r2 = Math.floor(i2 / COLS), c2 = i2 % COLS;
            const dist = Math.abs(r1 - r2) + Math.abs(c1 - c2);
            return dist === 1;
        }

        // 判斷是否能吃
        function canCapture(attacker, defender, fromIdx, toIdx) {
            // 砲的特殊規則 (rank 2)
            if (attacker.rank === 2) {
                return isValidCannonJump(fromIdx, toIdx);
            }

            // 一般棋子：只能吃相鄰
            if (!isAdjacent(fromIdx, toIdx)) return false;

            // 卒(1) 吃 將(7)
            if (attacker.rank === 1 && defender.rank === 7) return true;
            
            // 將(7) 不能吃 卒(1) (除了砲之外，小的不能吃大的，大的能吃小的)
            // 規則說：小的不能吃大的 (除了兵吃將)
            // 所以：攻擊者 >= 防禦者 (且排除 將吃卒 的情況)
            if (attacker.rank === 7 && defender.rank === 1) return false;

            return attacker.rank >= defender.rank;
        }

        // 砲的跳躍邏輯
        function isValidCannonJump(fromIdx, toIdx) {
            const r1 = Math.floor(fromIdx / COLS), c1 = fromIdx % COLS;
            const r2 = Math.floor(toIdx / COLS), c2 = toIdx % COLS;

            // 必須在同一行或同一列
            if (r1 !== r2 && c1 !== c2) return false;

            let obstacles = 0;

            if (r1 === r2) { // 同一列
                const minC = Math.min(c1, c2);
                const maxC = Math.max(c1, c2);
                for (let c = minC + 1; c < maxC; c++) {
                    const idx = r1 * COLS + c;
                    if (boardState[idx] !== null) obstacles++;
                }
            } else { // 同一行
                const minR = Math.min(r1, r2);
                const maxR = Math.max(r1, r2);
                for (let r = minR + 1; r < maxR; r++) {
                    const idx = r * COLS + c1;
                    if (boardState[idx] !== null) obstacles++;
                }
            }

            // 砲必須正好跳過一顆棋子 (炮台)
            return obstacles === 1;
        }

        function endTurn() {
            selectedIndex = -1;
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            renderBoard();
            updateStatus();
        }

        function updateStatus() {
            let colorText = "";
            if (playerColors[1]) {
                const p1Color = playerColors[1] === 'red' ? '<span style="color:#ff6b6b">紅方</span>' : '<span style="color:#aaa">黑方</span>';
                const p2Color = playerColors[2] === 'red' ? '<span style="color:#ff6b6b">紅方</span>' : '<span style="color:#aaa">黑方</span>';
                colorText = `P1: ${p1Color} | P2: ${p2Color}`;
            } else {
                colorText = "翻開第一顆棋子決定顏色";
            }
            
            const turnColor = currentPlayer === 1 ? playerColors[1] : playerColors[2];
            let turnText = `輪到：玩家 ${currentPlayer}`;
            if (turnColor) {
                turnText += (turnColor === 'red' ? " (紅)" : " (黑)");
            }

            statusEl.innerHTML = turnText;
            colorEl.innerHTML = colorText;
        }

        function checkWin() {
            const redPieces = boardState.filter(p => p && p.color === 'red');
            const blackPieces = boardState.filter(p => p && p.color === 'black');
            
            if (playerColors[1] !== null) {
                if (redPieces.length === 0) {
                    alert("黑方獲勝！");
                    isGameOver = true;
                } else if (blackPieces.length === 0) {
                    alert("紅方獲勝！");
                    isGameOver = true;
                }
            }
        }

        // 啟動遊戲
        initGame();

    </script>
</body>
</html>
