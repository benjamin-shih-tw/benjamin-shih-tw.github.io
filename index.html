<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>終極暗棋：砲火全開版</title>
    <style>
        :root {
            --board-bg: #eecfa1;
            --border-color: #5c4033;
            --piece-size: 60px;
        }

        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        h1 { margin-bottom: 5px; font-size: 1.5rem; text-align: center;}
        .rules { font-size: 0.8rem; color: #ccc; margin-bottom: 10px; text-align: center; line-height: 1.4; }
        .highlight-rule { color: #f1c40f; font-weight: bold; }

        #game-info {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            min-width: 280px;
        }

        #status { font-size: 1.2em; font-weight: bold; color: #f1c40f; }
        #player-color { margin-top: 5px; font-size: 0.9em; }
        #combo-msg { color: #e74c3c; font-weight: bold; height: 1.4em; margin-top: 5px;}

        /* 棋盤 Grid */
        #board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 2px;
            background-color: var(--border-color);
            border: 5px solid var(--border-color);
            padding: 5px;
            border-radius: 4px;
        }

        .cell {
            width: var(--piece-size);
            height: var(--piece-size);
            background-color: var(--board-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
        }

        /* 棋子樣式 */
        .piece {
            width: 85%;
            height: 85%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.4);
            user-select: none;
            border: 2px solid #8b4513;
            z-index: 2;
            transition: transform 0.2s;
        }

        .piece.hidden {
            background: linear-gradient(135deg, #8b4513 0%, #a0522d 100%);
            color: transparent;
            border: 2px solid #5c4033;
        }
        .piece.hidden::after {
            content: "☁";
            color: rgba(255,255,255,0.3);
            font-size: 1.2rem;
        }

        .piece.red { background-color: #fce4d6; color: #d00000; border-color: #d00000; }
        .piece.black { background-color: #fce4d6; color: #000000; border-color: #000000; }

        /* 選中狀態 */
        .piece.selected {
            box-shadow: 0 0 15px 5px yellow;
            transform: scale(1.15);
            z-index: 10;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 10px 3px yellow; }
            50% { box-shadow: 0 0 20px 8px yellow; }
            100% { box-shadow: 0 0 10px 3px yellow; }
        }

        /* 鎖定非活動棋子 (連吃模式時) */
        .dimmed { opacity: 0.5; pointer-events: none; }

        .btn-group { margin-top: 15px; display: flex; gap: 10px; }
        
        button {
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
        }

        .btn-restart { background: #27ae60; }
        .btn-restart:hover { background: #2ecc71; }

        .btn-pass { 
            background: #c0392b; 
            display: none;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-pass:hover { background: #e74c3c; }

        @keyframes popIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <h1>暗棋 (Dark Chess)</h1>
    <div class="rules">
        規則：可盲吃暗棋 | 吃子後可連吃<br>
        <span class="highlight-rule">砲吃子規則：隔一顆棋子跳吃，距離不限</span>
    </div>
    
    <div id="game-info">
        <div id="status">當前回合：玩家 1</div>
        <div id="player-color">顏色未定</div>
        <div id="combo-msg"></div>
    </div>

    <div id="board"></div>

    <div class="btn-group">
        <button id="btnPass" class="btn-pass" onclick="forceEndTurn()">停止連吃 (換人)</button>
        <button class="btn-restart" onclick="initGame()">重新開始</button>
    </div>

    <script>
        const ROWS = 4;
        const COLS = 8;
        
        const PIECE_TYPES = {
            red: [
                { name: '帥', rank: 7, count: 1 },
                { name: '仕', rank: 6, count: 2 },
                { name: '相', rank: 5, count: 2 },
                { name: '俥', rank: 4, count: 2 },
                { name: '傌', rank: 3, count: 2 },
                { name: '砲', rank: 2, count: 2 },
                { name: '兵', rank: 1, count: 5 }
            ],
            black: [
                { name: '將', rank: 7, count: 1 },
                { name: '士', rank: 6, count: 2 },
                { name: '象', rank: 5, count: 2 },
                { name: '車', rank: 4, count: 2 },
                { name: '馬', rank: 3, count: 2 },
                { name: '包', rank: 2, count: 2 },
                { name: '卒', rank: 1, count: 5 }
            ]
        };

        let boardState = [];
        let selectedIndex = -1;
        let currentPlayer = 1;
        let playerColors = { 1: null, 2: null };
        let isGameOver = false;

        // 連吃模式變數
        let isComboMode = false;
        let comboPieceIndex = -1;

        const boardEl = document.getElementById('board');
        const statusEl = document.getElementById('status');
        const colorEl = document.getElementById('player-color');
        const comboMsgEl = document.getElementById('combo-msg');
        const btnPass = document.getElementById('btnPass');

        function initGame() {
            let pieces = [];
            ['red', 'black'].forEach(color => {
                PIECE_TYPES[color].forEach(type => {
                    for(let i=0; i<type.count; i++) {
                        pieces.push({
                            color: color,
                            name: type.name,
                            rank: type.rank,
                            revealed: false
                        });
                    }
                });
            });

            // 洗牌
            for (let i = pieces.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pieces[i], pieces[j]] = [pieces[j], pieces[i]];
            }

            boardState = pieces;
            resetTurnState();
            currentPlayer = 1;
            playerColors = { 1: null, 2: null };
            isGameOver = false;

            renderBoard();
            updateStatus();
        }

        function resetTurnState() {
            selectedIndex = -1;
            isComboMode = false;
            comboPieceIndex = -1;
            btnPass.style.display = 'none';
            comboMsgEl.innerText = '';
        }

        function renderBoard() {
            boardEl.innerHTML = '';
            boardState.forEach((piece, index) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = index;
                cell.onclick = () => handleCellClick(index);

                if (piece) {
                    const pieceEl = document.createElement('div');
                    pieceEl.className = `piece ${piece.revealed ? piece.color : 'hidden'}`;
                    
                    if (index === selectedIndex) {
                        pieceEl.classList.add('selected');
                    }
                    // 連吃時，除了主角外其他變暗
                    if (isComboMode && index !== selectedIndex) {
                        pieceEl.classList.add('dimmed');
                    }

                    pieceEl.innerText = piece.name;
                    cell.appendChild(pieceEl);
                }
                boardEl.appendChild(cell);
            });
        }

        function handleCellClick(index) {
            if (isGameOver) return;

            const targetPiece = boardState[index];

            // 1. 連吃模式處理
            if (isComboMode) {
                if (index === comboPieceIndex) return; // 點自己
                
                // 必須是吃子動作才有效，移動到空格視為結束
                if (!targetPiece || (targetPiece && targetPiece !== boardState[comboPieceIndex])) {
                    attemptMove(comboPieceIndex, index);
                }
                return;
            }

            // 2. 正常回合
            // A. 翻牌 (或砲盲吃)
            if (targetPiece && !targetPiece.revealed) {
                // 如果已選中棋子，嘗試盲吃
                if (selectedIndex !== -1) {
                    attemptMove(selectedIndex, index);
                    return;
                }
                flipPiece(index);
                return;
            }

            // B. 選棋
            if (targetPiece && targetPiece.revealed) {
                if (playerColors[currentPlayer] && targetPiece.color !== playerColors[currentPlayer]) {
                    // 點敵方 -> 攻擊
                    if (selectedIndex !== -1) attemptMove(selectedIndex, index);
                    return;
                }
                // 點我方 -> 選取
                selectedIndex = index;
                renderBoard();
                return;
            }

            // C. 移動到空格
            if (!targetPiece && selectedIndex !== -1) {
                attemptMove(selectedIndex, index);
            }
        }

        function flipPiece(index) {
            const piece = boardState[index];
            piece.revealed = true;
            if (playerColors[1] === null) {
                playerColors[currentPlayer] = piece.color;
                playerColors[currentPlayer === 1 ? 2 : 1] = (piece.color === 'red' ? 'black' : 'red');
            }
            endTurn();
        }

        function attemptMove(fromIndex, toIndex) {
            const fromPiece = boardState[fromIndex];
            const toPiece = boardState[toIndex];
            
            // 判斷是否為砲吃子 (目標是棋子，無論明暗)
            const isCannonAttack = (fromPiece.rank === 2 && toPiece !== null);

            if (isCannonAttack) {
                // 砲吃子檢查：必須隔一顆，距離不限
                if (!isValidCannonJump(fromIndex, toIndex)) {
                    if(!isComboMode) { selectedIndex = -1; renderBoard(); }
                    return; // 無效的砲擊
                }
            } else {
                // 一般移動或吃子：必須相鄰
                if (!isAdjacent(fromIndex, toIndex)) {
                     if(!isComboMode) { selectedIndex = -1; renderBoard(); }
                     return;
                }
            }

            let isCapture = false;
            if (toPiece) {
                // 吃子階級判定 (盲吃無條件，明棋比大小)
                if (toPiece.revealed) {
                    if (!canCapture(fromPiece, toPiece)) {
                        alert("階級不符，無法吃子！");
                        if(!isComboMode) { selectedIndex = -1; renderBoard(); }
                        return;
                    }
                }
                isCapture = true;
            } else {
                // 移動到空格 (砲如果不吃子只能走一格)
                if (fromPiece.rank === 2 && !isAdjacent(fromIndex, toIndex)) {
                     if(!isComboMode) { selectedIndex = -1; renderBoard(); }
                     return;
                }
            }

            // 執行移動/吃子
            boardState[toIndex] = fromPiece;
            boardState[fromIndex] = null;

            if (isCapture) {
                // 連吃機制啟動
                isComboMode = true;
                comboPieceIndex = toIndex;
                selectedIndex = toIndex;
                
                checkWin();
                if(isGameOver) return;

                comboMsgEl.innerText = "🔥 連吃中！繼續吃或換人";
                btnPass.style.display = 'block';
                renderBoard();
            } else {
                // 純移動 -> 結束回合
                endTurn();
            }
        }

        function forceEndTurn() {
            if (isComboMode) endTurn();
        }

        function isAdjacent(i1, i2) {
            const r1 = Math.floor(i1 / COLS), c1 = i1 % COLS;
            const r2 = Math.floor(i2 / COLS), c2 = i2 % COLS;
            return (Math.abs(r1 - r2) + Math.abs(c1 - c2)) === 1;
        }

        function canCapture(attacker, defender) {
            if (attacker.rank === 2) return true; // 砲可以吃任何階級
            if (attacker.rank === 1 && defender.rank === 7) return true; // 卒吃將
            if (attacker.rank === 7 && defender.rank === 1) return false; // 將不可吃卒
            return attacker.rank >= defender.rank;
        }

        // --- 核心修改：砲的跳吃邏輯 (距離不限，隔一顆) ---
        function isValidCannonJump(fromIdx, toIdx) {
            const r1 = Math.floor(fromIdx / COLS), c1 = fromIdx % COLS;
            const r2 = Math.floor(toIdx / COLS), c2 = toIdx % COLS;

            // 必須同行或同列
            if (r1 !== r2 && c1 !== c2) return false;

            let obstacles = 0;

            if (r1 === r2) { // 同一列 (左右跳)
                const minC = Math.min(c1, c2), maxC = Math.max(c1, c2);
                // 檢查起點和終點之間所有的格子
                for (let c = minC + 1; c < maxC; c++) {
                    const idx = r1 * COLS + c;
                    if (boardState[idx] !== null) {
                        obstacles++;
                    }
                }
            } else { // 同一行 (上下跳)
                const minR = Math.min(r1, r2), maxR = Math.max(r1, r2);
                // 檢查起點和終點之間所有的格子
                for (let r = minR + 1; r < maxR; r++) {
                    const idx = r * COLS + c1;
                    if (boardState[idx] !== null) {
                        obstacles++;
                    }
                }
            }

            // 規則重點：中間必須「正好只有一顆」棋子 (空格不計)
            // 這樣就達成了「距離不限，隔一顆吃」的效果
            return obstacles === 1;
        }

        function endTurn() {
            resetTurnState();
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            renderBoard();
            updateStatus();
        }

        function updateStatus() {
            let colorText = "";
            if (playerColors[1]) {
                const p1Color = playerColors[1] === 'red' ? '<span style="color:#ff6b6b">紅方</span>' : '<span style="color:#aaa">黑方</span>';
                const p2Color = playerColors[2] === 'red' ? '<span style="color:#ff6b6b">紅方</span>' : '<span style="color:#aaa">黑方</span>';
                colorText = `P1: ${p1Color} | P2: ${p2Color}`;
            } else {
                colorText = "翻開第一顆棋子決定顏色";
            }
            
            const turnColor = currentPlayer === 1 ? playerColors[1] : playerColors[2];
            let turnText = `輪到：玩家 ${currentPlayer}`;
            if (turnColor) {
                turnText += (turnColor === 'red' ? " (紅)" : " (黑)");
            }

            statusEl.innerHTML = turnText;
            colorEl.innerHTML = colorText;
        }

        function checkWin() {
            const redPieces = boardState.filter(p => p && p.color === 'red');
            const blackPieces = boardState.filter(p => p && p.color === 'black');
            
            if (playerColors[1] !== null) {
                if (redPieces.length === 0) {
                    alert("黑方獲勝！");
                    isGameOver = true;
                } else if (blackPieces.length === 0) {
                    alert("紅方獲勝！");
                    isGameOver = true;
                }
            }
        }

        initGame();

    </script>
</body>
</html>
