<!doctype html>
<html lang="zh-TW">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>加強版極速排球 (進階人形版)</title>
		<script src="https://cdn.tailwindcss.com"></script>
		<style>
			body {
				margin: 0;
				overflow: hidden;
				background-color: #1a202c;
				color: white;
				font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
			}
			canvas {
				display: block;
				margin: 0 auto;
				background: linear-gradient(to bottom, #1a365d, #2b6cb0);
				box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
			}
			#game-container {
				position: relative;
				width: 800px;
				margin: 20px auto;
			}
			#ui-layer {
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				pointer-events: none;
			}
			.score {
				font-size: 4rem;
				font-weight: bold;
				position: absolute;
				top: 20px;
				opacity: 0.8;
			}
			#score-1p {
				left: 50px;
				color: #fbd38d;
			}
			#score-2p {
				right: 50px;
				color: #feb2b2;
			}
			#overlay {
				pointer-events: auto;
			}
			.key-btn {
				display: inline-block;
				padding: 2px 8px;
				background: #4a5568;
				border-radius: 4px;
				font-weight: bold;
				font-family: monospace;
			}
		</style>
	</head>
	<body class="bg-gray-900 flex items-center justify-center min-h-screen">
		<div id="game-container">
			<canvas id="gameCanvas" width="800" height="500"></canvas>

			<div id="ui-layer">
				<div id="score-1p" class="score">0</div>
				<div id="score-2p" class="score">0</div>
				<div
					id="status-text"
					class="absolute w-full text-center top-4 text-2xl font-bold text-yellow-300 drop-shadow-md"
				></div>
			</div>

			<!-- 遊戲開始說明畫面 -->
			<div
				id="overlay"
				class="absolute inset-0 bg-black bg-opacity-85 flex flex-col items-center justify-center rounded-lg overflow-y-auto py-8"
			>
				<h1 class="text-4xl font-bold mb-4 text-yellow-400 tracking-wider">
					⚡ 加強版極速排球 ⚡
				</h1>

				<div class="flex gap-8 mb-6 text-sm">
					<div class="bg-gray-800 p-4 rounded border border-gray-600 w-64">
						<h2
							class="text-xl font-bold mb-2 text-orange-300 border-b border-gray-600 pb-1"
						>
							1P (左方玩家)
						</h2>
						<ul class="space-y-2">
							<li>
								移動：<span class="key-btn">W</span>
								<span class="key-btn">A</span> <span class="key-btn">S</span>
								<span class="key-btn">D</span>
							</li>
							<li>擊球：<span class="key-btn">E</span></li>
						</ul>
					</div>
					<div class="bg-gray-800 p-4 rounded border border-gray-600 w-64">
						<h2
							class="text-xl font-bold mb-2 text-red-300 border-b border-gray-600 pb-1"
						>
							2P (右方玩家)
						</h2>
						<ul class="space-y-2">
							<li>
								移動：<span class="key-btn">↑</span>
								<span class="key-btn">↓</span> <span class="key-btn">←</span>
								<span class="key-btn">→</span>
							</li>
							<li>擊球：<span class="key-btn">Enter</span></li>
						</ul>
					</div>
				</div>

				<div
					class="bg-blue-900 bg-opacity-50 p-4 rounded mb-6 w-full max-w-2xl text-sm border border-blue-700"
				>
					<h3 class="font-bold text-blue-300 mb-2 text-lg">
						🔥 進階戰鬥技巧 (全新改版)
					</h3>
					<div class="grid grid-cols-2 gap-4">
						<ul class="list-disc pl-5 space-y-1 text-gray-200">
							<li>
								<strong class="text-yellow-300">飛撲救球：</strong
								>快速連按兩次左或右 (<span class="key-btn">A</span
								><span class="key-btn">A</span> 或 <span class="key-btn">D</span
								><span class="key-btn">D</span>)，自動彈高球。
							</li>
							<li>
								<strong class="text-red-400">前排蓄力暴扣：</strong>在網前跳起時
								<strong class="text-white">長按擊球鍵</strong
								>，放開後釋放毀滅重扣。
							</li>
						</ul>
						<ul class="list-disc pl-5 space-y-1 text-gray-200">
							<li>
								<strong class="text-blue-300">後排遠殺：</strong
								>在後排跳起擊球，軌跡會自動調平，輕鬆越過網子飛向對手後場。
							</li>
							<li>
								<strong class="text-green-300">前半身判定：</strong
								>殺球判定已修正！只要球在你的前方，就能順利擊出。
							</li>
						</ul>
					</div>
				</div>

				<button
					id="start-btn"
					class="bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-3 px-8 rounded-full text-xl shadow-[0_0_15px_rgba(236,201,75,0.5)] transition-transform hover:scale-105"
				>
					點擊開始對戰！
				</button>
			</div>
		</div>

		<script>
			const canvas = document.getElementById("gameCanvas");
			const ctx = canvas.getContext("2d");
			const overlay = document.getElementById("overlay");
			const startBtn = document.getElementById("start-btn");
			const statusText = document.getElementById("status-text");

			// 遊戲常數 (已調低重力)
			const GRAVITY = 0.25;
			const GROUND_Y = 450;
			const NET = { x: 390, y: 280, w: 20, h: 170 };
			let gameRunning = false;
			let shakeAmount = 0;
			let rallyMultiplier = 1.0;

			// 按鍵與雙擊狀態追蹤
			const keys = {};
			const keyTimers = {};
			const doubleTaps = {};

			window.addEventListener("keydown", (e) => {
				if (!keys[e.code]) {
					let now = Date.now();
					// 判斷 250 毫秒內的雙擊
					if (now - (keyTimers[e.code] || 0) < 250) {
						doubleTaps[e.code] = true;
					}
					keyTimers[e.code] = now;
				}
				keys[e.code] = true;
			});
			window.addEventListener("keyup", (e) => {
				keys[e.code] = false;
			});

			// 玩家類別 (重構為人形物理與動畫系統)
			class Player {
				constructor(x, color, isPlayer1) {
					this.w = 40; // 人形寬度變窄
					this.h = 80; // 人形高度變高
					this.startX = x;
					this.x = x;
					this.y = GROUND_Y - this.h;
					this.vx = 0;
					this.vy = 0;
					this.speed = 7;
					this.jumpPower = 8.5; // 配合低重力的跳躍力
					this.color = color;
					this.isPlayer1 = isPlayer1;

					// 狀態與動畫
					this.isGrounded = true;
					this.canDoubleJump = true;
					this.currentPose = "idle";
					this.poseTimer = 0;

					// 蓄力系統
					this.prevHitKeyDown = false;
					this.isCharging = false;
					this.chargePower = 0;

					// 撲球系統
					this.isDiving = false;
					this.diveTimer = 0;
					this.diveDir = 1;

					this.score = 0;
				}

				reset() {
					this.w = 40;
					this.h = 80;
					this.x = this.startX;
					this.y = GROUND_Y - this.h;
					this.vx = 0;
					this.vy = 0;
					this.isGrounded = true;
					this.canDoubleJump = true;
					this.isDiving = false;
					this.isCharging = false;
					this.currentPose = "idle";
				}

				startDive(dir) {
					if (this.isDiving) return;
					this.isDiving = true;
					this.diveTimer = 25; // 撲救持續時間
					this.diveDir = dir;
					this.vx = dir * 15; // 爆發速度
					this.vy = -5; // 稍微往上彈起
					this.isGrounded = false;
					this.currentPose = "dive";

					// 改變碰撞箱 (變寬變扁)
					let cx = this.x + this.w / 2;
					this.w = 80;
					this.h = 40;
					this.x = cx - 40;
					this.y += 40;
				}

				update() {
					// 取得控制輸入
					let up = this.isPlayer1 ? keys["KeyW"] : keys["ArrowUp"];
					let left = this.isPlayer1 ? keys["KeyA"] : keys["ArrowLeft"];
					let right = this.isPlayer1 ? keys["KeyD"] : keys["ArrowRight"];
					let hitKeyDown = this.isPlayer1 ? keys["KeyE"] : keys["Enter"];

					// 雙擊判斷
					let doubleLeft = this.isPlayer1
						? doubleTaps["KeyA"]
						: doubleTaps["ArrowLeft"];
					let doubleRight = this.isPlayer1
						? doubleTaps["KeyD"]
						: doubleTaps["ArrowRight"];

					// 飛撲狀態下鎖定常規控制
					if (this.isDiving) {
						this.diveTimer--;
						this.vy += GRAVITY;
						this.x += this.vx;
						this.y += this.vy;

						if (this.y + this.h >= GROUND_Y) {
							this.y = GROUND_Y - this.h;
							this.vy = 0;
							this.vx *= 0.8; // 地面摩擦力滑行
						}

						// 結束飛撲，恢復人形直立
						if (this.diveTimer <= 0) {
							this.isDiving = false;
							let cx = this.x + this.w / 2;
							this.w = 40;
							this.h = 80;
							this.x = cx - 20;
							this.y = GROUND_Y - this.h;
							this.currentPose = "idle";
						}
					} else {
						// --- 常規移動與控制 ---

						// 觸發飛撲
						if (this.isGrounded) {
							if (doubleLeft) this.startDive(-1);
							else if (doubleRight) this.startDive(1);
						}

						if (!this.isDiving) {
							if (left) this.vx = -this.speed;
							else if (right) this.vx = this.speed;
							else this.vx = 0;

							// 跳躍
							if (up) {
								if (this.isGrounded) {
									this.vy = -this.jumpPower;
									this.isGrounded = false;
									this.currentPose = "jump";
									keys[this.isPlayer1 ? "KeyW" : "ArrowUp"] = false;
								} else if (
									this.canDoubleJump &&
									this.vy > -2 &&
									!this.isCharging
								) {
									this.vy = -this.jumpPower * 0.9;
									this.canDoubleJump = false;
									createHitEffect(
										this.x + this.w / 2,
										this.y + this.h,
										"white",
										5,
									);
									keys[this.isPlayer1 ? "KeyW" : "ArrowUp"] = false;
								}
							}

							// 物理
							this.vy += GRAVITY;
							this.x += this.vx;
							this.y += this.vy;

							// 地面
							if (this.y + this.h >= GROUND_Y) {
								this.y = GROUND_Y - this.h;
								this.vy = 0;
								this.isGrounded = true;
								this.canDoubleJump = true;
								if (this.poseTimer <= 0 && !this.isCharging)
									this.currentPose = "idle";
							}

							// 前後排判定 (1P 網子在 390，前排算 > 200；2P 前排算 < 560)
							let isFrontRow = this.isPlayer1
								? this.x > 200
								: this.x < 600 - this.w;

							// --- 蓄力與擊球系統 ---
							if (hitKeyDown && !this.prevHitKeyDown) {
								// 剛按下
								if (!this.isGrounded && isFrontRow) {
									// 開始前排蓄力
									this.isCharging = true;
									this.chargePower = 0;
									this.currentPose = "charge";
								} else {
									// 立即擊球 (後排或地面)
									this.tryHitBall(false);
									this.currentPose = this.isGrounded ? "receive" : "spike";
									this.poseTimer = 15;
								}
							}

							if (hitKeyDown && this.isCharging) {
								// 蓄力中
								this.chargePower += 1;
								if (this.vy > 0) this.vy *= 0.85; // 滯空效果
								if (this.chargePower > 15 && Math.random() < 0.3) {
									createHitEffect(
										this.x + this.w / 2,
										this.y + 20,
										"#ecc94b",
										1,
									);
								}
							}

							if (!hitKeyDown && this.prevHitKeyDown) {
								// 放開擊球鍵
								if (this.isCharging) {
									this.tryHitBall(true, this.chargePower);
									this.isCharging = false;
									this.currentPose = "spike";
									this.poseTimer = 15;
								}
							}

							this.prevHitKeyDown = hitKeyDown;
						}
					}

					// 清除雙擊旗標以防重複觸發 (分開清除，避免 1P 清掉 2P 的指令)
					if (this.isPlayer1) {
						doubleTaps["KeyA"] = false;
						doubleTaps["KeyD"] = false;
					} else {
						doubleTaps["ArrowLeft"] = false;
						doubleTaps["ArrowRight"] = false;
					}

					// 牆壁與網子碰撞 (任何狀態皆適用)
					if (this.isPlayer1) {
						if (this.x < 0) this.x = 0;
						if (this.x + this.w > NET.x) this.x = NET.x - this.w;
					} else {
						if (this.x < NET.x + NET.w) this.x = NET.x + NET.w;
						if (this.x + this.w > canvas.width) this.x = canvas.width - this.w;
					}

					// 姿勢重置計時器
					if (this.poseTimer > 0) {
						this.poseTimer--;
					} else if (!this.isDiving && !this.isCharging) {
						this.currentPose = this.isGrounded
							? this.vx !== 0
								? "run"
								: "idle"
							: "jump";
					}
				}

				tryHitBall(isCharge, chargePower = 0) {
					let sideDir = this.isPlayer1 ? 1 : -1;
					let isFrontRow = this.isPlayer1
						? this.x > 200
						: this.x < 600 - this.w;
					let upPressed = this.isPlayer1 ? keys["KeyW"] : keys["ArrowUp"];

					// 修正判定：只要前半身碰到即可 (將檢查中心往前移)
					let hitOriginX = this.x + this.w / 2 + sideDir * this.w * 0.5;
					let hitOriginY = this.y + this.h * 0.3; // 上半身判定

					let dist = Math.hypot(ball.x - hitOriginX, ball.y - hitOriginY);
					let hitRadius = 60 + (isCharge ? 20 : 0); // 蓄力判定範圍更大

					if (dist < hitRadius + ball.r) {
						if (rallyMultiplier < 2.0) rallyMultiplier += 0.05;

						if (!this.isGrounded) {
							if (upPressed && !isCharge) {
								// 招式：欺敵吊球
								ball.vx = 8 * sideDir;
								ball.vy = -7;
								createHitEffect(ball.x, ball.y, "#63b3ed", 8);
								statusText.innerText = "✨ 欺敵吊球 ✨";
								ball.isDropShot = true;
							} else if (isCharge && chargePower >= 10) {
								// 招式：前排蓄力暴扣
								let powerLevel = Math.min(chargePower / 30, 1.5);
								ball.vx = (15 + powerLevel * 5) * sideDir;
								ball.vy = 12 + powerLevel * 10;
								shakeAmount = 15 + powerLevel * 15;
								createHitEffect(ball.x, ball.y, "#f56565", 25);
								statusText.innerText = "🔥🔥 蓄力暴扣！ 🔥🔥";
								ball.isDropShot = false;
							} else if (!isFrontRow) {
								// 招式：後排殺 (調整軌跡使其能過網)
								ball.vx = 17 * sideDir;
								ball.vy = 2; // 軌跡平滑不過度往下
								createHitEffect(ball.x, ball.y, "#4299e1", 12);
								statusText.innerText = "☄️ 後排遠殺 ☄️";
								ball.isDropShot = false;
							} else {
								// 一般殺球
								ball.vx = 13 * sideDir;
								ball.vy = 9;
								createHitEffect(ball.x, ball.y, "#fbd38d", 10);
								ball.isDropShot = false;
							}
						} else {
							// 地面接球
							ball.vx = 7 * sideDir;
							ball.vy = -14;
							createHitEffect(ball.x, ball.y, "#4fd1c5", 8);
							ball.isDropShot = false;
						}

						ball.y -= 5;
						clearTimeout(statusTimeout);
						if (statusText.innerText !== "") {
							statusTimeout = setTimeout(
								() => (statusText.innerText = ""),
								1500,
							);
						}
					}
				}

				draw() {
					ctx.save();

					// 移動到角色底部中心點
					let cx = this.x + this.w / 2;
					let cy = this.y + this.h;
					ctx.translate(cx, cy);

					// 決定面向
					let facing = this.isPlayer1 ? 1 : -1;
					if (this.isDiving) facing = Math.sign(this.vx) || facing; // 飛撲時根據速度方向轉向
					ctx.scale(facing, 1);

					// 蓄力特效
					if (this.isCharging) {
						ctx.beginPath();
						ctx.arc(0, -40, 50, 0, Math.PI * 2);
						ctx.fillStyle = `rgba(255, 100, 100, ${Math.min(this.chargePower / 40, 0.4)})`;
						ctx.fill();
					}

					// 人形繪圖設定
					ctx.lineWidth = 6;
					ctx.lineCap = "round";
					ctx.lineJoin = "round";
					ctx.strokeStyle = this.color;
					ctx.fillStyle = this.color;

					let headX = 0,
						headY = -70,
						bodyTilt = 0;
					let armRX = 15,
						armRY = -30,
						armLX = -15,
						armLY = -30;
					let legRX = 10,
						legRY = 0,
						legLX = -10,
						legLY = 0;

					// 根據姿勢決定骨架位置
					let timeOsc = Math.sin(Date.now() / 150);

					if (this.currentPose === "dive") {
						// 飛撲姿勢：身體水平、手往前伸
						headX = 25;
						headY = -20;
						bodyTilt = Math.PI / 2; // 轉 90 度
						armRX = 45;
						armRY = -5;
						armLX = 45;
						armLY = -5;
						legRX = -15;
						legRY = -10;
						legLX = -30;
						legLY = -5;
					} else if (this.currentPose === "receive") {
						// 接球姿勢：微蹲，手合攏往前
						headY = -55;
						bodyTilt = 0.3;
						armRX = 25;
						armRY = -20;
						armLX = 25;
						armLY = -20;
						legLX = -15;
						legLY = 0;
						legRX = 15;
						legRY = 0;
					} else if (this.currentPose === "charge") {
						// 蓄力姿勢：身體後仰，打擊手往後拉
						bodyTilt = -0.3;
						armRX = -30;
						armRY = -70; // 蓄力手
						armLX = 20;
						armLY = -40; // 平衡手
						legLX = -10;
						legLY = 0;
						legRX = 10;
						legRY = 0;
					} else if (this.currentPose === "spike") {
						// 殺球姿勢：身體前傾，手往前揮
						bodyTilt = 0.4;
						armRX = 35;
						armRY = -20; // 揮擊手
						armLX = -20;
						armLY = -50;
					} else if (!this.isGrounded) {
						// 跳躍姿勢
						armRX = 20;
						armRY = -85;
						armLX = -20;
						armLY = -85;
						legRY = -15;
						legLY = -10; // 膝蓋微彎
					} else if (this.currentPose === "run") {
						// 跑步姿勢 (簡易擺動)
						headY = -68 + timeOsc * 2;
						armRX = timeOsc * 20;
						armRY = -30;
						armLX = -timeOsc * 20;
						armLY = -30;
						legRX = -timeOsc * 15;
						legLX = timeOsc * 15;
					} else {
						// Idle 待機姿勢 (呼吸效果)
						headY = -70 + timeOsc * 2;
					}

					// 旋轉身體中心 (如果不是飛撲)
					if (this.currentPose !== "dive") {
						ctx.rotate(bodyTilt);
					}

					// 畫頭部
					ctx.beginPath();
					ctx.arc(headX, headY, 14, 0, Math.PI * 2);
					ctx.fill();

					// 畫身體
					ctx.beginPath();
					if (this.currentPose === "dive") {
						ctx.moveTo(headX - 14, headY);
						ctx.lineTo(-20, headY);
					} else {
						ctx.moveTo(0, headY + 14);
						ctx.lineTo(0, -35); // 臀部位置
					}
					ctx.stroke();

					// 畫手腳
					if (this.currentPose === "dive") {
						// 飛撲四肢
						ctx.beginPath();
						ctx.moveTo(0, headY);
						ctx.lineTo(armLX, armLY);
						ctx.moveTo(0, headY);
						ctx.lineTo(armRX, armRY);
						ctx.moveTo(-20, headY);
						ctx.lineTo(legLX, legLY);
						ctx.moveTo(-20, headY);
						ctx.lineTo(legRX, legRY);
						ctx.stroke();
					} else {
						// 正常四肢
						ctx.beginPath();
						ctx.moveTo(0, -50);
						ctx.lineTo(armLX, armLY);
						ctx.moveTo(0, -50);
						ctx.lineTo(armRX, armRY);
						ctx.moveTo(0, -35);
						ctx.lineTo(legLX, legLY);
						ctx.moveTo(0, -35);
						ctx.lineTo(legRX, legRY);
						ctx.stroke();
					}

					// 畫眼睛 (堅定眼神)
					ctx.fillStyle = "white";
					let eyeX = headX + (this.currentPose === "dive" ? 5 : 6);
					let eyeY = headY - (this.currentPose === "dive" ? 5 : 2);
					ctx.beginPath();
					ctx.arc(eyeX, eyeY, 4, 0, Math.PI * 2);
					ctx.fill();
					ctx.fillStyle = "black";
					ctx.beginPath();
					ctx.arc(eyeX + 1.5, eyeY, 2, 0, Math.PI * 2);
					ctx.fill();

					ctx.restore();
				}
			}

			// 球類別
			class Ball {
				constructor() {
					this.r = 20;
					this.reset(1);
					this.trail = [];
					this.isDropShot = false;
				}

				reset(serveSide) {
					this.x = serveSide === 1 ? 200 : 600;
					this.y = 100;
					this.vx = 0;
					this.vy = 0;
					this.trail = [];
					this.isDropShot = false;
					rallyMultiplier = 1.0;
				}

				update() {
					this.trail.push({ x: this.x, y: this.y });
					if (this.trail.length > 15) this.trail.shift();

					let currentGravity = GRAVITY * rallyMultiplier;

					if (this.isDropShot && this.vy > 0) {
						this.vx *= 0.96;
						currentGravity *= 1.4;
					}

					this.vy += currentGravity;
					if (this.vy > 25) this.vy = 25;

					this.x += this.vx * rallyMultiplier;
					this.y += this.vy * rallyMultiplier;

					// 牆壁
					if (this.x - this.r < 0) {
						this.x = this.r;
						this.vx *= -0.8;
					} else if (this.x + this.r > canvas.width) {
						this.x = canvas.width - this.r;
						this.vx *= -0.8;
					}

					// 網子碰撞
					if (
						this.x + this.r > NET.x &&
						this.x - this.r < NET.x + NET.w &&
						this.y + this.r > NET.y
					) {
						if (this.y < NET.y + 10) {
							this.vy *= -0.8;
							this.y = NET.y - this.r;
						} else {
							this.vx *= -0.8;
							if (this.x < NET.x + NET.w / 2) this.x = NET.x - this.r;
							else this.x = NET.x + NET.w + this.r;
						}
					}

					// 身體碰撞彈開與撲救自動接球
					[p1, p2].forEach((p) => {
						// 簡易邊界框判定
						let testX = this.x,
							testY = this.y;
						if (this.x < p.x) testX = p.x;
						else if (this.x > p.x + p.w) testX = p.x + p.w;
						if (this.y < p.y) testY = p.y;
						else if (this.y > p.y + p.h) testY = p.y + p.h;

						let dist = Math.hypot(this.x - testX, this.y - testY);
						if (dist < this.r) {
							if (p.isDiving) {
								// 神級自動撲救
								let sideDir = p.isPlayer1 ? 1 : -1;
								this.vx = 4 * sideDir;
								this.vy = -16;
								this.y -= 10;
								createHitEffect(this.x, this.y, "#9ae6b4", 15);
								statusText.innerText = "🛡️ 神級撲救！ 🛡️";
								clearTimeout(statusTimeout);
								statusTimeout = setTimeout(
									() => (statusText.innerText = ""),
									1500,
								);
							} else {
								// 被動身體推開
								let angle = Math.atan2(
									this.y - (p.y + p.h / 2),
									this.x - (p.x + p.w / 2),
								);
								this.vx = Math.cos(angle) * 7;
								this.vy = Math.sin(angle) * 7 - 5;
								this.y -= 5;
							}
							this.isDropShot = false;
						}
					});

					// 落地
					if (this.y + this.r >= GROUND_Y) {
						shakeAmount = 10;
						this.y = GROUND_Y - this.r;
						this.vy = -this.vy * 0.5;
						this.vx *= 0.5;
						score(this.x < NET.x ? 2 : 1);
					}
				}

				draw() {
					if (
						rallyMultiplier > 1.2 ||
						Math.abs(this.vy) > 15 ||
						Math.abs(this.vx) > 10
					) {
						for (let i = 0; i < this.trail.length; i++) {
							let point = this.trail[i];
							let alpha = i / this.trail.length;
							ctx.beginPath();
							ctx.arc(point.x, point.y, this.r * alpha, 0, Math.PI * 2);
							ctx.fillStyle = `rgba(255, 255, 0, ${alpha * 0.5})`;
							ctx.fill();
						}
					}

					ctx.beginPath();
					ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
					ctx.fillStyle = "#ecc94b";
					ctx.fill();
					ctx.lineWidth = 3;
					ctx.strokeStyle = "#b7791f";
					ctx.stroke();
					ctx.beginPath();
					ctx.arc(this.x, this.y, this.r, 0.2, 2.9);
					ctx.stroke();
					ctx.beginPath();
					ctx.arc(this.x, this.y, this.r, 3.3, 6.0);
					ctx.stroke();
				}
			}

			// 視覺特效
			let particles = [];
			function createHitEffect(x, y, color, count = 10) {
				for (let i = 0; i < count; i++) {
					particles.push({
						x: x,
						y: y,
						vx: (Math.random() - 0.5) * 15,
						vy: (Math.random() - 0.5) * 15,
						life: 1.0,
						color: color,
					});
				}
			}

			let statusTimeout;
			function score(playerNum) {
				if (!gameRunning) return;
				gameRunning = false;
				statusText.innerText = `${playerNum}P 得分！`;

				if (playerNum === 1) {
					p1.score++;
					document.getElementById("score-1p").innerText = p1.score;
				} else {
					p2.score++;
					document.getElementById("score-2p").innerText = p2.score;
				}

				setTimeout(() => {
					p1.reset();
					p2.reset();
					ball.reset(playerNum === 1 ? 2 : 1);
					statusText.innerText = "";
					gameRunning = true;
				}, 1500);
			}

			// 初始化
			const p1 = new Player(100, "#ed8936", true);
			const p2 = new Player(636, "#f56565", false);
			const ball = new Ball();

			function gameLoop() {
				ctx.save();
				if (shakeAmount > 0) {
					ctx.translate(
						(Math.random() - 0.5) * shakeAmount,
						(Math.random() - 0.5) * shakeAmount,
					);
					shakeAmount *= 0.8;
					if (shakeAmount < 0.5) shakeAmount = 0;
				}

				ctx.clearRect(0, 0, canvas.width, canvas.height);

				if (gameRunning) {
					p1.update();
					p2.update();
					ball.update();
				}

				// 畫背景物件
				ctx.fillStyle = "#a0aec0";
				ctx.fillRect(NET.x, NET.y, NET.w, NET.h);
				ctx.fillStyle = "#e2e8f0";
				ctx.fillRect(NET.x - 2, NET.y, NET.w + 4, 10);
				ctx.fillStyle = "#2f855a";
				ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
				ctx.fillStyle = "#fff";
				ctx.fillRect(0, GROUND_Y, canvas.width, 5);

				// 畫特效
				for (let i = particles.length - 1; i >= 0; i--) {
					let p = particles[i];
					p.x += p.vx;
					p.y += p.vy;
					p.life -= 0.05;
					ctx.globalAlpha = p.life;
					ctx.fillStyle = p.color;
					ctx.beginPath();
					ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
					ctx.fill();
					ctx.globalAlpha = 1.0;
					if (p.life <= 0) particles.splice(i, 1);
				}

				p1.draw();
				p2.draw();
				ball.draw();
				ctx.restore();
				requestAnimationFrame(gameLoop);
			}

			startBtn.addEventListener("click", () => {
				overlay.style.display = "none";
				gameRunning = true;
				p1.reset();
				p2.reset();
				ball.reset(1);
				document.getElementById("score-1p").innerText = "0";
				document.getElementById("score-2p").innerText = "0";
				p1.score = 0;
				p2.score = 0;
			});

			gameLoop();
		</script>
	</body>
</html>
