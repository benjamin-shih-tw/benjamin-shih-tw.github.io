<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加強版極速排球 - 寫實全螢幕版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: "hsl(240 10% 3.9%)",
                        foreground: "hsl(0 0% 98%)",
                        card: "hsl(240 10% 3.9%)",
                        "card-foreground": "hsl(0 0% 98%)",
                        primary: "hsl(0 0% 98%)",
                        "primary-foreground": "hsl(240 5.9% 10%)",
                        muted: "hsl(240 3.7% 15.9%)",
                        "muted-foreground": "hsl(240 5% 64.9%)",
                        border: "hsl(240 3.7% 15.9%)",
                        input: "hsl(240 3.7% 15.9%)",
                        ring: "hsl(240 4.9% 83.9%)",
                    }
                }
            }
        }
    </script>
    <style>
        /* 讓 Body 填滿整個視窗並隱藏滾動條 */
        body { 
            margin: 0; 
            padding: 0;
            overflow: hidden; 
            background-color: #09090b; 
            color: #f8fafc; 
            font-family: ui-sans-serif, system-ui, sans-serif; 
            width: 100vw;
            height: 100vh;
        }
        
        /* Canvas 佔滿整個畫面 */
        canvas { 
            display: block; 
            width: 100vw; 
            height: 100vh; 
        }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        .score { font-size: 5rem; font-weight: 900; position: absolute; top: 20px; opacity: 0.9; font-family: monospace; text-shadow: 0 4px 12px rgba(0,0,0,0.5); }
        #score-1p { left: 5vw; color: #fb923c; }
        #score-2p { right: 5vw; color: #f87171; }
        #timer-text { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-size: 3rem; font-family: monospace; color: #fff; font-weight: bold; background: rgba(0,0,0,0.5); padding: 0 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(4px); }
        
        #overlay { pointer-events: auto; }
        
        /* 極光動畫 CSS */
        @keyframes aurora1 {
            0% { transform: translateX(-10vw) translateY(-5vh) rotate(0deg) scale(1); }
            50% { transform: translateX(5vw) translateY(3vh) rotate(180deg) scale(1.1); }
            100% { transform: translateX(10vw) translateY(-3vh) rotate(360deg) scale(0.9); }
        }
        @keyframes aurora2 {
            0% { transform: translateX(8vw) translateY(4vh) rotate(45deg) scale(0.8); }
            50% { transform: translateX(-3vw) translateY(-2vh) rotate(225deg) scale(1.2); }
            100% { transform: translateX(-8vw) translateY(6vh) rotate(405deg) scale(0.9); }
        }
        @keyframes aurora3 {
            0% { transform: translateX(-5vw) translateY(2vh) rotate(90deg) scale(1.1); }
            50% { transform: translateX(7vw) translateY(-4vh) rotate(270deg) scale(0.8); }
            100% { transform: translateX(-2vw) translateY(5vh) rotate(450deg) scale(1.0); }
        }
        @keyframes aurora4 {
            0% { transform: translateX(3vw) translateY(-2vh) rotate(135deg) scale(0.9); }
            50% { transform: translateX(-6vw) translateY(1vh) rotate(315deg) scale(1.1); }
            100% { transform: translateX(4vw) translateY(-6vh) rotate(495deg) scale(0.8); }
        }

        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="relative">

<!-- 遊戲畫布 -->
<canvas id="gameCanvas"></canvas>

<!-- UI 層 -->
<div id="ui-layer">
    <div id="score-1p" class="score">0</div>
    <div id="timer-text"></div>
    <div id="score-2p" class="score">0</div>
    <div id="status-text" class="absolute w-full text-center top-32 text-4xl font-black text-white drop-shadow-[0_0_12px_rgba(255,255,255,0.9)] tracking-widest"></div>
</div>

<!-- 遊戲初始選單 (Aurora Background + Shadcn Drawer Style) -->
<div id="overlay" class="absolute inset-0 bg-background flex flex-col items-center justify-center overflow-hidden z-20">
    <!-- Aurora Background Elements -->
    <div class="absolute inset-0 z-0">
        <div class="absolute inset-0 opacity-70">
            <div class="absolute top-0 left-0 w-full h-full bg-gradient-to-br from-blue-900/40 via-purple-900/30 to-indigo-900/40"></div>
        </div>
        <div class="absolute inset-0">
            <div class="absolute inset-0 opacity-60" style="background: radial-gradient(ellipse 60vw 60vh at 50% 20%, rgba(59, 130, 246, 0.3) 0%, transparent 50%); animation: aurora1 8s ease-in-out infinite alternate"></div>
            <div class="absolute inset-0 opacity-50" style="background: radial-gradient(ellipse 50vw 50vh at 80% 30%, rgba(139, 92, 246, 0.4) 0%, transparent 50%); animation: aurora2 6s ease-in-out infinite alternate-reverse"></div>
            <div class="absolute inset-0 opacity-40" style="background: radial-gradient(ellipse 55vw 55vh at 20% 60%, rgba(236, 72, 153, 0.3) 0%, transparent 50%); animation: aurora3 10s ease-in-out infinite alternate"></div>
            <div class="absolute inset-0 opacity-30" style="background: radial-gradient(ellipse 70vw 40vh at 60% 80%, rgba(34, 197, 94, 0.2) 0%, transparent 50%); animation: aurora4 7s ease-in-out infinite alternate-reverse"></div>
        </div>
        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-black/10"></div>
    </div>

    <!-- Shadcn UI Styled Content Card -->
    <div class="relative z-10 flex flex-col items-center w-full max-w-2xl px-6">
        <h1 class="text-6xl font-extrabold text-white mb-2 tracking-tight drop-shadow-2xl text-center">
            Super Volleyball
        </h1>
        <p class="text-lg text-muted-foreground mb-8 text-center">Select game mode and jump into the court.</p>
        
        <!-- Shadcn Card -->
        <div class="bg-card/60 backdrop-blur-md border border-border w-full rounded-xl shadow-2xl p-6 mb-6">
            <div class="flex items-center gap-2 mb-6 pb-4 border-b border-border">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-foreground"><path d="M12 20a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/><path d="M12 12 4 8"/><path d="M12 12v8"/><path d="m12 12 8-4"/></svg>
                <h2 class="text-lg font-semibold text-foreground">Game Settings</h2>
            </div>

            <div class="grid grid-cols-2 gap-6">
                <!-- Score Mode -->
                <label class="flex flex-col gap-3 cursor-pointer group">
                    <div class="flex items-center gap-2">
                        <input type="radio" name="mode" id="mode-score" value="score" class="w-4 h-4 accent-white" checked>
                        <span class="text-foreground font-medium">Score Limit</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <input type="number" id="score-limit" min="10" max="30" value="15" 
                            class="flex h-10 w-full rounded-md border border-input bg-background/50 px-3 py-2 text-sm ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 text-foreground transition-all">
                        <span class="text-sm text-muted-foreground whitespace-nowrap">pts</span>
                    </div>
                </label>

                <!-- Time Mode -->
                <label class="flex flex-col gap-3 cursor-pointer group">
                    <div class="flex items-center gap-2">
                        <input type="radio" name="mode" id="mode-time" value="time" class="w-4 h-4 accent-white">
                        <span class="text-foreground font-medium text-muted-foreground" id="time-title">Time Limit</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <input type="number" id="time-limit" min="30" max="300" value="60" disabled
                            class="flex h-10 w-full rounded-md border border-input bg-background/50 px-3 py-2 text-sm ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50 text-muted-foreground transition-all">
                        <span class="text-sm text-muted-foreground whitespace-nowrap">sec</span>
                    </div>
                </label>
            </div>
        </div>

        <!-- Controls Info -->
        <div class="flex gap-4 w-full mb-8 text-sm">
            <div class="flex-1 bg-card/40 backdrop-blur-sm border border-border p-4 rounded-lg flex flex-col items-center">
                <span class="text-orange-400 font-bold mb-2 text-base">1P (Left)</span>
                <div class="text-muted-foreground text-center space-y-1">
                    <p>Move: <strong class="text-foreground text-base">W A S D</strong></p>
                    <p>Action: <strong class="text-foreground text-base">E</strong></p>
                </div>
            </div>
            <div class="flex-1 bg-card/40 backdrop-blur-sm border border-border p-4 rounded-lg flex flex-col items-center">
                <span class="text-red-400 font-bold mb-2 text-base">2P (Right)</span>
                <div class="text-muted-foreground text-center space-y-1">
                    <p>Move: <strong class="text-foreground text-base">Arrows</strong></p>
                    <p>Action: <strong class="text-foreground text-base">Enter</strong></p>
                </div>
            </div>
        </div>

        <button id="start-btn" class="inline-flex items-center justify-center whitespace-nowrap rounded-md text-base font-bold ring-offset-background transition-transform hover:scale-105 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 bg-primary text-primary-foreground hover:bg-primary/90 h-14 px-10 w-full max-w-md shadow-[0_0_20px_rgba(255,255,255,0.3)]">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2"><polygon points="6 3 20 12 6 21 6 3"/></svg>
            Start Match
        </button>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- 動態全螢幕解析度邏輯 ---
const logicalHeight = 600; // 提升邏輯高度以容納更高的人物
let logicalWidth = 1000;
let scaleFactor = 1;

function resizeGame() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    // 依據高度計算縮放比例
    scaleFactor = canvas.height / logicalHeight;
    // 反推動態的邏輯寬度 (確保左右填滿螢幕無黑邊)
    logicalWidth = canvas.width / scaleFactor;
    
    // 更新網子位置到畫面正中央
    NET.x = logicalWidth / 2 - NET.w / 2;
    
    // 如果視窗縮小導致 2P 在界外，把他拉回來
    // 加上 try-catch 防止未宣告變數錯誤
    try {
      if (typeof p2 !== 'undefined' && p2 !== null && p2.x > logicalWidth - p2.w) {
          p2.x = logicalWidth - p2.w;
      }
    } catch(e) {
      // 忽略錯誤，代表 p2 還沒初始化
    }
}

// -------------------------

const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('start-btn');
const statusText = document.getElementById('status-text');
const timerText = document.getElementById('timer-text');

// UI 邏輯
const modeScoreRadio = document.getElementById('mode-score');
const modeTimeRadio = document.getElementById('mode-time');
const scoreLimitInput = document.getElementById('score-limit');
const timeLimitInput = document.getElementById('time-limit');
const timeTitle = document.getElementById('time-title');

modeScoreRadio.addEventListener('change', () => {
    scoreLimitInput.disabled = false; scoreLimitInput.classList.remove('text-muted-foreground'); scoreLimitInput.classList.add('text-foreground');
    timeLimitInput.disabled = true; timeLimitInput.classList.add('text-muted-foreground'); timeLimitInput.classList.remove('text-foreground');
    timeTitle.classList.add('text-muted-foreground'); modeScoreRadio.nextElementSibling.classList.remove('text-muted-foreground');
});
modeTimeRadio.addEventListener('change', () => {
    scoreLimitInput.disabled = true; scoreLimitInput.classList.add('text-muted-foreground'); scoreLimitInput.classList.remove('text-foreground');
    timeLimitInput.disabled = false; timeLimitInput.classList.remove('text-muted-foreground'); timeLimitInput.classList.add('text-foreground');
    modeScoreRadio.nextElementSibling.classList.add('text-muted-foreground'); timeTitle.classList.remove('text-muted-foreground');
});

// 遊戲常數 (物理與維度微調以適應高大角色與寬場地)
const GRAVITY = 0.28;
const GROUND_Y = 500; 
const NET = { x: 0, y: 280, w: 22, h: 220 }; // 網子變高

let gameState = 'MENU';
let gameMode = 'score'; 
let targetScore = 15;
let timeLimit = 60;
let timeRemaining = 60;
let currentServer = 1;

let shakeAmount = 0;
let rallyMultiplier = 1.0;
let lastFrameTime = 0;

const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

class Player {
    constructor(isPlayer1, color) {
        // 角色長高、變寬
        this.w = 50; 
        this.h = 130; 
        this.color = color;
        this.isPlayer1 = isPlayer1;
        this.speed = 9.5; // 配合較寬的場地提升跑速
        this.jumpPower = 10.5; // 配合身高提升跳躍力
        
        this.resetPosition();
        
        this.isGrounded = true;
        this.canDoubleJump = true;
        this.currentPose = 'idle';
        this.poseTimer = 0;
        
        this.prevHitKeyDown = false;
        this.isCharging = false;
        this.chargePower = 0;

        this.isDiving = false;
        this.diveTimer = 0;
        this.diveDir = 1;
        this.score = 0;
    }

    resetPosition() {
        this.x = this.isPlayer1 ? logicalWidth * 0.15 : logicalWidth * 0.85 - this.w;
        this.y = GROUND_Y - this.h;
        this.vx = 0; this.vy = 0;
    }

    reset() {
        this.w = 50; this.h = 130;
        this.resetPosition();
        this.isGrounded = true;
        this.canDoubleJump = true;
        this.isDiving = false;
        this.isCharging = false;
        this.currentPose = 'idle';
    }

    startDive(dir) {
        if (this.isDiving) return;
        this.isDiving = true;
        this.diveTimer = 28;
        this.diveDir = dir;
        this.vx = dir * 16; 
        this.vy = -6;
        this.isGrounded = false;
        this.currentPose = 'dive';

        let cx = this.x + this.w / 2;
        this.w = 110; this.h = 50; // 飛撲時碰撞箱變長
        this.x = cx - 55; this.y += 80;
    }

    update() {
        let up = this.isPlayer1 ? keys['KeyW'] : keys['ArrowUp'];
        let left = this.isPlayer1 ? keys['KeyA'] : keys['ArrowLeft'];
        let right = this.isPlayer1 ? keys['KeyD'] : keys['ArrowRight'];
        let hitKeyDown = this.isPlayer1 ? keys['KeyE'] : keys['Enter'];

        // 發球鎖定
        if (gameState === 'SERVING') {
            let isMyServe = (this.isPlayer1 && currentServer === 1) || (!this.isPlayer1 && currentServer === 2);
            if (isMyServe) {
                this.x = this.isPlayer1 ? 50 : logicalWidth - 50 - this.w;
                this.y = GROUND_Y - this.h;
                this.vx = 0; this.vy = 0;
                this.isGrounded = true;
                this.currentPose = 'idle';

                ball.x = this.x + this.w / 2 + (this.isPlayer1 ? 30 : -30);
                ball.y = this.y - 20;
                ball.vx = 0; ball.vy = 0;
                ball.isDropShot = false;

                if (hitKeyDown && !this.prevHitKeyDown) {
                    gameState = 'PLAYING';
                    ball.vy = -14;
                    ball.vx = (this.isPlayer1 ? 1 : -1) * 8;
                    this.currentPose = 'spike';
                    this.poseTimer = 20;
                    createHitEffect(ball.x, ball.y, '#fbd38d', 15);
                    statusText.innerText = "";
                }
                this.prevHitKeyDown = hitKeyDown;
                return;
            }
        }

        if (this.isDiving) {
            this.diveTimer--;
            this.vy += GRAVITY;
            this.x += this.vx;
            this.y += this.vy;

            if (this.y + this.h >= GROUND_Y) {
                this.y = GROUND_Y - this.h;
                this.vy = 0;
                this.vx *= 0.8;
            }

            if (this.diveTimer <= 0) {
                this.isDiving = false;
                let cx = this.x + this.w / 2;
                this.w = 50; this.h = 130;
                this.x = cx - 25; this.y = GROUND_Y - this.h;
                this.currentPose = 'idle';
            }
        } else {
            if (left) this.vx = -this.speed;
            else if (right) this.vx = this.speed;
            else this.vx = 0;

            if (up) {
                if (this.isGrounded) {
                    this.vy = -this.jumpPower;
                    this.isGrounded = false;
                    this.currentPose = 'jump';
                    keys[this.isPlayer1 ? 'KeyW' : 'ArrowUp'] = false;
                } else if (this.canDoubleJump && this.vy > -2 && !this.isCharging) {
                    this.vy = -this.jumpPower * 0.9;
                    this.canDoubleJump = false;
                    createHitEffect(this.x + this.w/2, this.y + this.h, 'white', 5);
                    keys[this.isPlayer1 ? 'KeyW' : 'ArrowUp'] = false;
                }
            }

            this.vy += GRAVITY;
            this.x += this.vx;
            this.y += this.vy;

            if (this.y + this.h >= GROUND_Y) {
                this.y = GROUND_Y - this.h;
                this.vy = 0;
                this.isGrounded = true;
                this.canDoubleJump = true;
                if (this.poseTimer <= 0 && !this.isCharging) this.currentPose = 'idle';
            }

            let isFrontRow = this.isPlayer1 ? (this.x > logicalWidth * 0.3) : (this.x < logicalWidth * 0.7 - this.w);

            if (gameState === 'PLAYING' || gameState === 'SCORED') {
                if (hitKeyDown && !this.prevHitKeyDown) {
                    if (this.isGrounded) {
                        let dir = left ? -1 : (right ? 1 : (this.isPlayer1 ? 1 : -1));
                        this.startDive(dir);
                    } else if (isFrontRow) {
                        this.isCharging = true;
                        this.chargePower = 0;
                        this.currentPose = 'charge';
                    } else {
                        this.tryHitBall(false);
                        this.currentPose = 'spike';
                        this.poseTimer = 15;
                    }
                }

                if (hitKeyDown && this.isCharging) {
                    this.chargePower += 1;
                    if (this.vy > 0) this.vy *= 0.82; 
                    if (this.chargePower > 15 && Math.random() < 0.3) createHitEffect(this.x + this.w/2, this.y + 20, '#ecc94b', 1);
                }

                if (!hitKeyDown && this.prevHitKeyDown) {
                    if (this.isCharging) {
                        this.tryHitBall(true, this.chargePower);
                        this.isCharging = false;
                        this.currentPose = 'spike';
                        this.poseTimer = 15;
                    }
                }
            }
        }
        
        this.prevHitKeyDown = hitKeyDown;

        // 確保角色不出界
        if (this.isPlayer1) {
            if (this.x < 0) this.x = 0;
            if (this.x + this.w > NET.x) this.x = NET.x - this.w;
        } else {
            if (this.x < NET.x + NET.w) this.x = NET.x + NET.w;
            if (this.x + this.w > logicalWidth) this.x = logicalWidth - this.w;
        }

        if (this.poseTimer > 0) this.poseTimer--;
        else if (!this.isDiving && !this.isCharging) {
            this.currentPose = this.isGrounded ? (this.vx !== 0 ? 'run' : 'idle') : 'jump';
        }
    }

    tryHitBall(isCharge, chargePower = 0) {
        if (gameState !== 'PLAYING') return;

        let sideDir = this.isPlayer1 ? 1 : -1;
        let isFrontRow = this.isPlayer1 ? (this.x > logicalWidth * 0.3) : (this.x < logicalWidth * 0.7 - this.w);
        let upPressed = this.isPlayer1 ? keys['KeyW'] : keys['ArrowUp'];

        // 調整擊球判定點到肩膀前方
        let hitOriginX = this.x + this.w/2 + (sideDir * this.w * 0.6);
        let hitOriginY = this.y + this.h * 0.25; 
        let dist = Math.hypot(ball.x - hitOriginX, ball.y - hitOriginY);
        let hitRadius = 75 + (isCharge ? 25 : 0); 

        if (dist < hitRadius + ball.r) {
            if (rallyMultiplier < 2.2) rallyMultiplier += 0.05;

            if (upPressed && !isCharge) {
                ball.vx = 9 * sideDir; ball.vy = -8;
                createHitEffect(ball.x, ball.y, '#63b3ed', 8);
                statusText.innerText = "✨ Drop Shot ✨";
                ball.isDropShot = true;
            } else if (isCharge && chargePower >= 10) {
                let powerLevel = Math.min(chargePower / 30, 1.5);
                ball.vx = (18 + powerLevel * 6) * sideDir; ball.vy = 14 + powerLevel * 10;
                shakeAmount = 18 + powerLevel * 15;
                createHitEffect(ball.x, ball.y, '#ef4444', 30);
                statusText.innerText = "🔥🔥 SUPER SPIKE 🔥🔥";
                ball.isDropShot = false;
            } else if (!isFrontRow) {
                ball.vx = 20 * sideDir; ball.vy = 2; 
                createHitEffect(ball.x, ball.y, '#3b82f6', 15);
                statusText.innerText = "☄️ Back Row ☄️";
                ball.isDropShot = false;
            } else {
                ball.vx = 15 * sideDir; ball.vy = 10;
                createHitEffect(ball.x, ball.y, '#fbd38d', 12);
                ball.isDropShot = false;
            }
            
            ball.y -= 5;
            clearTimeout(window.statusTimeout);
            window.statusTimeout = setTimeout(() => statusText.innerText = "", 1500);
        }
    }

    // 逼真人體骨架渲染
    draw() {
        ctx.save();
        let cx = this.x + this.w / 2; 
        let cy = this.y + this.h;
        ctx.translate(cx, cy);

        let facing = this.isPlayer1 ? 1 : -1;
        if (this.isDiving) facing = Math.sign(this.vx) || facing; 
        ctx.scale(facing, 1);

        if (this.isCharging) {
            ctx.beginPath(); ctx.arc(0, -60, 60, 0, Math.PI*2);
            ctx.fillStyle = `rgba(239, 68, 68, ${Math.min(this.chargePower/40, 0.4)})`; ctx.fill();
        }

        // 定義身體節點
        let headY = -115, headX = 0;
        let shoulderY = -95, hipY = -55;
        let bodyTilt = 0;
        
        // 預設關節位置
        let rElbowX = 15, rElbowY = -70, rHandX = 15, rHandY = -40;
        let lElbowX = -15, lElbowY = -70, lHandX = -15, lHandY = -40;
        let rKneeX = 12, rKneeY = -25, rFootX = 15, rFootY = 0;
        let lKneeX = -12, lKneeY = -25, lFootX = -15, lFootY = 0;

        let timeOsc = Math.sin(Date.now() / 150);

        if (this.currentPose === 'dive') {
            headX = 40; headY = -30; bodyTilt = Math.PI / 2; 
            shoulderY = -95; hipY = -55; // relative to body rotation
            rElbowX = 65; rElbowY = -15; rHandX = 85; rHandY = -5;
            lElbowX = 65; lElbowY = -5; lHandX = 85; lHandY = 5;
            rKneeX = -25; rKneeY = -15; rFootX = -50; rFootY = -5;
            lKneeX = -25; lKneeY = -5; lFootX = -50; lFootY = 5;
        } else if (this.currentPose === 'charge') {
            bodyTilt = -0.2; 
            rElbowX = -35; rElbowY = -100; rHandX = -45; rHandY = -120; // 往後拉弓
            lElbowX = 25; lElbowY = -75; lHandX = 35; lHandY = -55;
            rKneeX = -5; rKneeY = -25; rFootX = 10; rFootY = 0;
            lKneeX = 15; lKneeY = -25; lFootX = -10; lFootY = 0;
        } else if (this.currentPose === 'spike') {
            bodyTilt = 0.3; 
            rElbowX = 35; rElbowY = -50; rHandX = 55; rHandY = -30; // 往下扣殺
            lElbowX = -25; lElbowY = -75; lHandX = -35; lHandY = -55;
            rKneeX = -5; rKneeY = -25; rFootX = 10; rFootY = 0;
        } else if (!this.isGrounded) {
            // 跳躍中
            rElbowX = 25; rElbowY = -120; rHandX = 15; rHandY = -145; // 雙手高舉
            lElbowX = -25; lElbowY = -120; lHandX = -15; lHandY = -145;
            rKneeX = 15; rKneeY = -35; rFootX = 10; rFootY = -15; // 屈膝
            lKneeX = -15; lKneeY = -35; lFootX = -10; lFootY = -15;
        } else if (this.currentPose === 'run') {
            headY = -112 + timeOsc * 3;
            rElbowX = timeOsc * 25; rElbowY = -70; rHandX = timeOsc * 35; rHandY = -40;
            lElbowX = -timeOsc * 25; lElbowY = -70; lHandX = -timeOsc * 35; lHandY = -40;
            rKneeX = -timeOsc * 20; rKneeY = -25; rFootX = -timeOsc * 30; rFootY = 0;
            lKneeX = timeOsc * 20; lKneeY = -25; lFootX = timeOsc * 30; lFootY = 0;
        } else {
            // Idle 呼吸
            headY = -115 + timeOsc * 2;
            shoulderY = -95 + timeOsc * 2;
        }

        if (this.currentPose !== 'dive') ctx.rotate(bodyTilt);

        const skinColor = '#fdba74'; // 逼真的膚色
        const clothColor = this.color; 
        const shortsColor = '#1e293b';

        // 輔助繪製四肢的函數
        const drawLimb = (x1, y1, x2, y2, x3, y3, isArm) => {
            // 上半部 (大腿/大臂)
            ctx.strokeStyle = skinColor;
            ctx.lineWidth = isArm ? 10 : 12;
            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
            // 下半部 (小腿/小臂)
            ctx.lineWidth = isArm ? 8 : 10;
            ctx.beginPath(); ctx.moveTo(x2, y2); ctx.lineTo(x3, y3); ctx.stroke();
            // 關節
            ctx.fillStyle = '#f97316'; ctx.beginPath(); ctx.arc(x2, y2, isArm? 5: 6, 0, Math.PI*2); ctx.fill();
            // 手掌/鞋子
            ctx.fillStyle = isArm ? skinColor : '#ffffff';
            ctx.beginPath(); ctx.arc(x3, y3, isArm? 6: 8, 0, Math.PI*2); ctx.fill();
        };

        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        if (this.currentPose === 'dive') {
            // 飛撲特別處理 (因為身體旋轉了)
            drawLimb(0, shoulderY, lElbowX, lElbowY, lHandX, lHandY, true); // 左手
            drawLimb(0, hipY, lKneeX, lKneeY, lFootX, lFootY, false);       // 左腳
            
            // 身體 (球衣與球褲)
            ctx.lineWidth = 22; ctx.strokeStyle = clothColor;
            ctx.beginPath(); ctx.moveTo(0, shoulderY); ctx.lineTo(0, hipY); ctx.stroke();
            ctx.lineWidth = 24; ctx.strokeStyle = shortsColor;
            ctx.beginPath(); ctx.moveTo(0, hipY); ctx.lineTo(0, hipY + 15); ctx.stroke();
            
            drawLimb(0, shoulderY, rElbowX, rElbowY, rHandX, rHandY, true); // 右手
            drawLimb(0, hipY, rKneeX, rKneeY, rFootX, rFootY, false);       // 右腳
        } else {
            // 正常直立繪製順序：後方手腳 -> 身體 -> 前方手腳
            drawLimb(0, shoulderY, lElbowX, lElbowY, lHandX, lHandY, true);
            drawLimb(0, hipY, lKneeX, lKneeY, lFootX, lFootY, false);
            
            // 軀幹
            ctx.lineWidth = 24; ctx.strokeStyle = clothColor;
            ctx.beginPath(); ctx.moveTo(0, shoulderY+5); ctx.lineTo(0, hipY); ctx.stroke();
            // 短褲
            ctx.lineWidth = 26; ctx.strokeStyle = shortsColor;
            ctx.beginPath(); ctx.moveTo(0, hipY); ctx.lineTo(0, hipY + 18); ctx.stroke();
            
            drawLimb(0, shoulderY, rElbowX, rElbowY, rHandX, rHandY, true);
            drawLimb(0, hipY, rKneeX, rKneeY, rFootX, rFootY, false);
        }

        // 頭部
        ctx.fillStyle = skinColor;
        ctx.beginPath(); ctx.arc(headX, headY, 18, 0, Math.PI*2); ctx.fill();
        // 頭帶/頭髮
        ctx.fillStyle = clothColor;
        ctx.beginPath(); ctx.arc(headX, headY, 19, Math.PI, Math.PI*2); ctx.fill();

        // 眼睛
        ctx.fillStyle = 'white';
        let eyeX = headX + (this.currentPose === 'dive' ? 6 : 8), eyeY = headY - (this.currentPose === 'dive' ? 6 : 3);
        ctx.beginPath(); ctx.arc(eyeX, eyeY, 5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(eyeX + 1.5, eyeY, 2.5, 0, Math.PI*2); ctx.fill();

        ctx.restore();
    }
}

class Ball {
    constructor() { this.r = 24; this.trail = []; this.isDropShot = false; }
    reset() { this.vx = 0; this.vy = 0; this.trail = []; this.isDropShot = false; rallyMultiplier = 1.0; }

    update() {
        this.trail.push({x: this.x, y: this.y});
        if (this.trail.length > 15) this.trail.shift();

        let currentGravity = GRAVITY * rallyMultiplier;
        if (this.isDropShot && this.vy > 0) { this.vx *= 0.95; currentGravity *= 1.4; }

        this.vy += currentGravity;
        if (this.vy > 28) this.vy = 28; // 高度增加，終端速度微調

        this.x += this.vx * rallyMultiplier; this.y += this.vy * rallyMultiplier;

        if (this.x - this.r < 0) { this.x = this.r; this.vx *= -0.8; }
        else if (this.x + this.r > logicalWidth) { this.x = logicalWidth - this.r; this.vx *= -0.8; }

        // 網子碰撞
        if (this.x + this.r > NET.x && this.x - this.r < NET.x + NET.w && this.y + this.r > NET.y) {
            if (this.y < NET.y + 12) { this.vy *= -0.8; this.y = NET.y - this.r; } 
            else { 
                this.vx *= -0.8;
                if (this.x < NET.x + NET.w/2) this.x = NET.x - this.r;
                else this.x = NET.x + NET.w + this.r;
            }
        }

        [p1, p2].forEach(p => {
            let testX = this.x, testY = this.y;
            if (this.x < p.x) testX = p.x; else if (this.x > p.x + p.w) testX = p.x + p.w;
            if (this.y < p.y) testY = p.y; else if (this.y > p.y + p.h) testY = p.y + p.h;

            let dist = Math.hypot(this.x - testX, this.y - testY);
            if (dist < this.r) {
                if (p.isDiving && gameState === 'PLAYING') {
                    let sideDir = p.isPlayer1 ? 1 : -1;
                    this.vx = 5 * sideDir; this.vy = -18; this.y -= 12;
                    createHitEffect(this.x, this.y, '#4ade80', 20);
                    statusText.innerText = "🛡️ SUPER SAVE! 🛡️";
                    clearTimeout(window.statusTimeout); window.statusTimeout = setTimeout(() => statusText.innerText = "", 1500);
                } else {
                    let angle = Math.atan2(this.y - (p.y + p.h/2), this.x - (p.x + p.w/2));
                    this.vx = Math.cos(angle) * 8; this.vy = Math.sin(angle) * 8 - 6; this.y -= 5; 
                }
                this.isDropShot = false;
            }
        });

        if (this.y + this.r >= GROUND_Y) {
            shakeAmount = 15; this.y = GROUND_Y - this.r;
            this.vy = -this.vy * 0.5; this.vx *= 0.5;
            if (gameState === 'PLAYING') score(this.x < logicalWidth/2 ? 2 : 1); 
        }
    }

    draw() {
        if (rallyMultiplier > 1.2 || Math.abs(this.vy) > 16 || Math.abs(this.vx) > 12) {
            for (let i = 0; i < this.trail.length; i++) {
                let point = this.trail[i]; let alpha = i / this.trail.length;
                ctx.beginPath(); ctx.arc(point.x, point.y, this.r * alpha, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(250, 204, 21, ${alpha * 0.4})`; ctx.fill();
            }
        }

        ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = '#fef08a'; ctx.fill();
        ctx.lineWidth = 3; ctx.strokeStyle = '#ca8a04'; ctx.stroke();
        
        ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0.2, 2.9); ctx.stroke();
        ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 3.3, 6.0); ctx.stroke();
    }
}

let particles = [];
function createHitEffect(x, y, color, count = 10) {
    for (let i = 0; i < count; i++) particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 18, vy: (Math.random() - 0.5) * 18, life: 1.0, color: color });
}

function endGame() {
    gameState = 'GAME_OVER';
    let winnerText = p1.score > p2.score ? "1P WINS! 🏆" : (p2.score > p1.score ? "2P WINS! 🏆" : "DRAW! 🤝");
    statusText.innerText = `MATCH OVER! ${winnerText}`;
    
    setTimeout(() => {
        overlay.style.display = 'flex';
        startBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg> Play Again';
        statusText.innerText = "";
        gameState = 'MENU';
    }, 4000);
}

function score(playerNum) {
    if (gameState !== 'PLAYING') return;
    gameState = 'SCORED'; 
    statusText.innerText = `POINT FOR ${playerNum}P !`;
    
    if (playerNum === 1) p1.score++; else p2.score++;
    document.getElementById('score-1p').innerText = p1.score; document.getElementById('score-2p').innerText = p2.score;
    currentServer = playerNum; 

    setTimeout(() => {
        if (gameMode === 'score' && (p1.score >= targetScore || p2.score >= targetScore)) {
            endGame(); return;
        }
        p1.resetPosition(); p2.resetPosition(); ball.reset();
        gameState = 'SERVING';
        statusText.innerText = `${playerNum}P SERVE (Press Action)`;
    }, 1500);
}

// 監聽器和 resizeGame 先前已設定，現在初始化物件
window.addEventListener('resize', resizeGame);
resizeGame(); // 確保 p1/p2 還沒初始前，logicalWidth 等常數已就位

const p1 = new Player(true, '#f97316'); // 亮橘色 1P
const p2 = new Player(false, '#ef4444'); // 亮紅色 2P
const ball = new Ball();


// 繪製細緻的高質感室內球場 (支援動態寬度)
function drawStadium() {
    // 牆壁漸層
    let wallGrad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    wallGrad.addColorStop(0, '#020617'); 
    wallGrad.addColorStop(1, '#1e293b'); 
    ctx.fillStyle = wallGrad;
    ctx.fillRect(0, 0, logicalWidth, GROUND_Y);

    // 聚光燈效果
    let spotlight = ctx.createRadialGradient(logicalWidth/2, 100, 50, logicalWidth/2, GROUND_Y, logicalWidth*0.6);
    spotlight.addColorStop(0, 'rgba(255, 255, 255, 0.15)');
    spotlight.addColorStop(1, 'rgba(255, 255, 255, 0)');
    ctx.fillStyle = spotlight;
    ctx.fillRect(0, 0, logicalWidth, GROUND_Y);

    // 透視木頭地板
    let floorGrad = ctx.createLinearGradient(0, GROUND_Y, 0, logicalHeight);
    floorGrad.addColorStop(0, '#78350f'); 
    floorGrad.addColorStop(1, '#d97706'); 
    ctx.fillStyle = floorGrad;
    ctx.fillRect(0, GROUND_Y, logicalWidth, logicalHeight - GROUND_Y);

    // 木板透視發散線
    ctx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
    ctx.lineWidth = 3;
    for (let i = -logicalWidth; i < logicalWidth * 2; i += 60) {
        ctx.beginPath();
        let endX = logicalWidth / 2 + (i - logicalWidth / 2) * 3.5; 
        ctx.moveTo(i, GROUND_Y);
        ctx.lineTo(endX, logicalHeight);
        ctx.stroke();
    }
    
    // 白線
    ctx.fillStyle = 'rgba(255,255,255,0.85)'; 
    ctx.fillRect(0, GROUND_Y - 2, logicalWidth, 4); 

    // 網柱與球網
    let postGrad = ctx.createLinearGradient(NET.x, 0, NET.x + NET.w, 0);
    postGrad.addColorStop(0, '#475569');
    postGrad.addColorStop(0.5, '#94a3b8');
    postGrad.addColorStop(1, '#334155');
    ctx.fillStyle = postGrad;
    ctx.fillRect(NET.x, NET.y, NET.w, NET.h);
    
    ctx.fillStyle = '#f8fafc';
    ctx.fillRect(NET.x - 4, NET.y, NET.w + 8, 14);
    ctx.fillStyle = '#cbd5e1';
    ctx.fillRect(NET.x - 4, NET.y + 12, NET.w + 8, 2); 
    
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for(let y = NET.y + 20; y < NET.y + NET.h; y += 15) {
        ctx.moveTo(NET.x, y); ctx.lineTo(NET.x + NET.w, y);
    }
    for(let x = NET.x; x <= NET.x + NET.w; x += 11) {
        ctx.moveTo(x, NET.y + 14); ctx.lineTo(x, NET.y + NET.h);
    }
    ctx.stroke();
}

function gameLoop(timestamp) {
    if (!lastFrameTime) lastFrameTime = timestamp;
    let deltaTime = timestamp - lastFrameTime;
    lastFrameTime = timestamp;
    
    // 保證 Canvas 與螢幕大小一致 (應對視窗改變)
    if(canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
        resizeGame();
    }

    ctx.save();
    
    // 套用動態解析度縮放
    ctx.scale(scaleFactor, scaleFactor);

    if (shakeAmount > 0) {
        ctx.translate((Math.random() - 0.5) * shakeAmount, (Math.random() - 0.5) * shakeAmount);
        shakeAmount *= 0.8;
        if (shakeAmount < 0.5) shakeAmount = 0;
    }

    // 清除的是「邏輯」大小的區塊
    ctx.clearRect(0, 0, logicalWidth, logicalHeight);

    if (gameState === 'PLAYING' || gameState === 'SCORED' || gameState === 'SERVING') {
        p1.update(); p2.update(); 
        if (gameState === 'PLAYING' || gameState === 'SCORED') ball.update();

        if (gameMode === 'time' && gameState === 'PLAYING') {
            timeRemaining -= deltaTime / 1000;
            if (timeRemaining <= 0) { timeRemaining = 0; endGame(); }
            timerText.innerText = Math.ceil(timeRemaining);
        }
    }

    drawStadium();

    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx; p.y += p.vy; p.life -= 0.05;
        ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1.0;
        if (p.life <= 0) particles.splice(i, 1);
    }

    if (gameState !== 'MENU') {
        p1.draw(); p2.draw(); 
        if (gameState !== 'GAME_OVER') ball.draw();
    }
    
    ctx.restore();
    requestAnimationFrame(gameLoop);
}

startBtn.addEventListener('click', () => {
    gameMode = modeScoreRadio.checked ? 'score' : 'time';
    targetScore = parseInt(scoreLimitInput.value) || 15;
    if(targetScore < 10) targetScore = 10; if(targetScore > 30) targetScore = 30;
    
    timeLimit = parseInt(timeLimitInput.value) || 60;
    if(timeLimit < 30) timeLimit = 30; if(timeLimit > 300) timeLimit = 300;
    timeRemaining = timeLimit;

    overlay.style.display = 'none';
    p1.score = 0; p2.score = 0;
    document.getElementById('score-1p').innerText = "0"; 
    document.getElementById('score-2p').innerText = "0";
    timerText.innerText = gameMode === 'time' ? timeLimit : "";
    
    currentServer = 1; 
    p1.reset(); p2.reset(); ball.reset();
    
    gameState = 'SERVING';
    statusText.innerText = "1P SERVE (Press Action)";
    lastFrameTime = performance.now();
});

requestAnimationFrame(gameLoop);
</script>
</body>
